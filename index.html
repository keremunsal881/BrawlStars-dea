<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Brawl Stars 100 Karakter</title>
<style>
body { background: linear-gradient(#0f0f0f,#3a0066); color:white; text-align:center; font-family:Arial;}
h1 { color: gold; margin-bottom:10px;}
input { padding:10px; width:250px; border-radius:10px; border:none; margin-bottom:20px;}
.container {display:flex; flex-wrap:wrap; justify-content:center;}
.card {background:#1e1e1e; margin:8px; padding:10px; border-radius:10px; width:140px; cursor:pointer; transition:.3s; text-align:center;}
.card:hover {transform:scale(1.05); background:#333;}
.card img {width:100%; border-radius:10px; margin-bottom:5px;}
#popup {position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:#111; padding:20px; border-radius:10px; display:none; width:340px;}
button {margin-top:10px; padding:8px;}
</style>
</head>
<body>

<h1>🔥 BRAWL STARS 🔥</h1>
<input type="text" id="search" placeholder="Karakter ara..." onkeyup="search()">

<div class="container" id="container"></div>

<div id="popup">
<h2 id="name"></h2>
<p id="desc"></p>
<button onclick="document.getElementById('popup').style.display='none'">Kapat</button>
</div>

<script>
// 100 karakter
const brawlers = ["Crow","Chester","Frank","Edgar","Jessie","Darryl","Dynamike","Piper","Tara","Surge",
"Clancy","Rico","Colt","Chuck","Carl","Angelo","Jacky","Pam","Buzz","Stu",
"8-Bit","Mico","Nani","Colette","Byron","Melodie","Juju","Larry & Lawrie","Meeple","Berry",
"El Primo","Poco","Shelly","Shade","Bull","Nita","Penny","Ash","Brock","Rosa",
"Barley","Sam","Eve","Bea","Finx","Belle","Maisie","Draco","Tick","Gus",
"Lily","Otis","Lola","Emz","Bibi","Griff","Grom","Bonnie","Gale","Mandy",
"Hank","Pearl","Trunk","Mortis","Gene","Max","Mr. P","Sprout","Squeak","Lou",
"Ruffs","Fang","Janet","Buster","Gray","R-T","Willow","Doug","Charlie","Moe",
"Ollie","Lumi","Jae-Yong","Alli","Mina","Ziggy","Glowy","Spike","Leon","Sandy",
"Amber","Meg","Cordelius","Kit","Kenji","Pierce","Kaze","Sirius"
];

// Açıklamalar: örnek Byron, Crow, Leon, Spike, Jessie uzun, diğerleri şablon
const descriptions = {
"Byron":"Byron temel saldırısıyla rakipleri zehirler ve takım arkadaşlarını iyileştirir. Süper ile büyük bir iksir şişesi atar, hasar verir ve iyileştirir.",
"Crow":"Crow temel saldırısında zehirli hançerler fırlatır, rakipler zamanla hasar alır. Süper ile havaya zıplayıp etrafa hançer saçar, hem kaçış hem saldırı için uygundur.",
"Leon":"Leon temel saldırısında dönen bıçaklar fırlatır, yakın mesafede yüksek hasar verir. Süper ile görünmez olur ve rakiplere fark edilmeden yaklaşır.",
"Spike":"Spike temel saldırısında dikenli kaktüs bombası fırlatır ve patladığında geniş alana hasar verir. Süper ile alanı kontrol eder ve düşmanları yavaşlatır.",
"Jessie":"Jessie temel saldırısında elektrik topu fırlatır ve yakınındaki düşmanları etkiler. Süper ile otomatik ateş eden bir turret yerleştirir.",
};

// Genel şablon açıklama diğerleri için
function generalDesc(name){
  return name + " temel saldırısıyla rakiplere hasar verir ve takım arkadaşlarına destek olabilir. Süper özelliği ise alan hasarı veya avantaj sağlar.";
}

// Kartları oluştur
function createCards(){
  const container=document.getElementById("container");
  brawlers.forEach(b=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML = `
      <img src="https://api.dicebear.com/7.x/bottts/svg?seed=${b}" alt="${b}">
      <p>${b}</p>`;
    div.onclick = () => {
      document.getElementById("name").innerText = b;
      document.getElementById("desc").innerText = descriptions[b] ? descriptions[b] : generalDesc(b);
      document.getElementById("popup").style.display = "block";
    };
    container.appendChild(div);
  });
}

// Arama
function search(){
  const v=document.getElementById("search").value.toLowerCase();
  [...document.getElementsByClassName("card")].forEach(x=>x.style.display=x.innerText.toLowerCase().includes(v)?"block":"none");
}

// Başlat
createCards();
</script>

</body>
</html>
