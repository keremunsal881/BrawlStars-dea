// Kartları oluştur
function createCards(){
  const container=document.getElementById("container");
  brawlers.forEach(b=>{
    const div=document.createElement("div");
    div.className="card";
    div.innerHTML=`<img src="https://static.wikia.nocookie.net/brawlstars/images/3/33/${b.replace(/ /g,"_")}_icon.png" onerror="this.src='https://api.dicebear.com/7.x/bottts/svg?seed=${b}'"><p>${b}</p>`;
    div.onclick=()=>{document.getElementById("name").innerText=b; document.getElementById("desc").innerText=descriptions[b]; document.getElementById("popup").style.display="block";};
    container.appendChild(div);
  });
}

function search(){
  const v=document.getElementById("search").value.toLowerCase();
  [...document.getElementsByClassName("card")].forEach(x=>x.style.display=x.innerText.toLowerCase().includes(v)?"block":"none");
}
